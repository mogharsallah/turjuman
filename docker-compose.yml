# LocalStack — the single AWS emulator behind ALL local work: the dev loop
# (`pnpm run dev`), integration (Tier A) and full deployed end-to-end (Tier B)
# tests. Community edition; no auth token required.
#
#   pnpm run localstack:up     # start (docker compose up -d localstack + health wait)
#   pnpm run localstack:down   # stop and wipe (docker compose down -v)
#
# The Docker socket is mounted so LocalStack can run Lambda functions as sibling
# containers. LAMBDA_DOCKER_FLAGS adds a host.docker.internal route into each
# Lambda container so the deployed webhook dispatcher can reach a webhook
# receiver running on the host during the e2e test.
services:
  localstack:
    image: localstack/localstack:4
    ports:
      - "4566:4566"
    environment:
      # ssm + ecr are needed by the standard CDK bootstrap (CDKToolkit): it
      # writes a CdkBootstrapVersion SSM parameter and creates an ECR repo for
      # image assets. The deploy CLI also stores its config in SSM.
      - SERVICES=dynamodb,dynamodbstreams,lambda,cloudformation,s3,iam,sts,logs,cloudwatch,ssm,ecr
      - DEBUG=${LOCALSTACK_DEBUG:-0}
      - DOCKER_HOST=unix:///var/run/docker.sock
      - LAMBDA_DOCKER_FLAGS=--add-host=host.docker.internal:host-gateway
    extra_hosts:
      - "host.docker.internal:host-gateway"
    volumes:
      - "/var/run/docker.sock:/var/run/docker.sock"
    healthcheck:
      test: ["CMD-SHELL", "curl -sf http://localhost:4566/_localstack/health || exit 1"]
      interval: 5s
      timeout: 5s
      retries: 30
