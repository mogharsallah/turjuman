name: ci

# Run on PRs and on pushes to main. Feature branches are covered by their PR, so
# this avoids the duplicate push+pull_request run on every branch push.
on:
  push:
    branches: [main]
  pull_request:

# Cancel an in-progress run when a newer commit is pushed to the same ref, so
# rapid pushes don't pile up redundant (and slow) e2e runs.
concurrency:
  group: ci-${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

# Least privilege: every job here only reads the repo (checkout). None writes
# contents, opens PRs, or touches packages, so default the GITHUB_TOKEN to
# read-only and let any future job opt into more explicitly. (Publishing lives in
# release.yml, which scopes its own elevated permissions.)
permissions:
  contents: read

jobs:
  # Build once, then share the output. `pnpm run build` (per-package tsc + the
  # esbuild Lambda bundles with the embedded QuickJS wasm) is the single most
  # expensive step, and dependents import core's built dist — so every downstream
  # job needs it. Rather than rebuild in each (the old `e2e` job did a second full
  # build), we tar the build products and hand them to verify / integration /
  # e2e-deploy. A tarball preserves the exact repo-relative paths (no artifact
  # least-common-ancestor surprises) and uploads/downloads in one shot.
  build:
    name: build (shared artifact)
    runs-on: ubuntu-latest
    timeout-minutes: 15
    steps:
      - uses: actions/checkout@df4cb1c069e1874edd31b4311f1884172cec0e10 # v6
      - uses: pnpm/action-setup@0ebf47130e4866e96fce0953f49152a61190b271 # v6.0.9
      - uses: actions/setup-node@48b55a011bda9f5d6aeb4c2d9c7362e8dae4041e # v6
        with:
          node-version: 24
          cache: pnpm
      - run: pnpm install --frozen-lockfile
      - run: pnpm run build
      # The build products downstream jobs consume: every package's dist, the
      # three pre-bundled Lambda assets (api: handler + webhook; mcp-server:
      # handler), and the generated knowledge corpus.
      - name: Package build output
        run: |
          tar -czf build-output.tar.gz \
            packages/*/dist \
            packages/api/lambda packages/api/lambda-webhook \
            packages/mcp-server/lambda \
            packages/knowledge/src/generated/corpus.json
      - uses: actions/upload-artifact@ea165f8d65b6e75b540449e92b4886f43607fa02 # v4
        with:
          name: build-output
          path: build-output.tar.gz
          retention-days: 1
          if-no-files-found: error

  verify:
    name: typecheck + openapi + unit
    runs-on: ubuntu-latest
    needs: build
    timeout-minutes: 10
    steps:
      - uses: actions/checkout@df4cb1c069e1874edd31b4311f1884172cec0e10 # v6
      - uses: pnpm/action-setup@0ebf47130e4866e96fce0953f49152a61190b271 # v6.0.9
      - uses: actions/setup-node@48b55a011bda9f5d6aeb4c2d9c7362e8dae4041e # v6
        with:
          node-version: 24
          cache: pnpm
      - run: pnpm install --frozen-lockfile
      - uses: actions/download-artifact@d3f86a106a0bac45b974a628896c90dbdf5c8093 # v4
        with:
          name: build-output
      - run: tar -xzf build-output.tar.gz
      - run: pnpm run typecheck
      - name: OpenAPI snapshot is current (regenerate + check for drift)
        run: |
          pnpm run gen:openapi
          git diff --exit-code -- docs/api-reference/openapi.json \
            || (echo "::error::docs/api-reference/openapi.json is stale — run 'pnpm run gen:openapi' and commit." && exit 1)
      - run: pnpm run test:unit # hermetic — integration/e2e suites self-skip

  format:
    name: format + lint (Biome)
    runs-on: ubuntu-latest
    timeout-minutes: 10
    steps:
      - uses: actions/checkout@df4cb1c069e1874edd31b4311f1884172cec0e10 # v6
      - uses: pnpm/action-setup@0ebf47130e4866e96fce0953f49152a61190b271 # v6.0.9
      - uses: actions/setup-node@48b55a011bda9f5d6aeb4c2d9c7362e8dae4041e # v6
        with:
          node-version: 24
          cache: pnpm
      - run: pnpm install --frozen-lockfile
      # `biome ci` is read-only (no --write) and emits GitHub annotations on
      # any formatting/lint drift. No build needed — Biome reads source directly.
      - run: pnpm exec biome ci .

  docs:
    name: docs link check (Mintlify)
    runs-on: ubuntu-latest
    timeout-minutes: 10
    steps:
      - uses: actions/checkout@df4cb1c069e1874edd31b4311f1884172cec0e10 # v6
      - uses: pnpm/action-setup@0ebf47130e4866e96fce0953f49152a61190b271 # v6.0.9
      - uses: actions/setup-node@48b55a011bda9f5d6aeb4c2d9c7362e8dae4041e # v6
        with:
          node-version: 24
      - name: Check internal doc links
        # Leave the Mintlify CLI UNPINNED on purpose: pnpm-workspace.yaml's
        # `minimumReleaseAge: 10080` (7-day cooldown) already blocks freshly
        # published (possibly compromised) versions, so `dlx` resolves to the
        # newest version that is >=7 days old. That cooldown is the supply-chain
        # guard for npm deps (the SHA-pin stance is for GitHub Actions, which have
        # no cooldown). A version pin here breaks CI whenever it is <7 days old.
        run: pnpm dlx mint broken-links
        working-directory: docs

  # Tier A (repo+services vs real DynamoDB) plus the in-process transport e2e
  # (the MCP/REST handlers invoked directly against LocalStack DynamoDB — no CDK
  # deploy). Both need only DynamoDB, so they share one LocalStack and run in
  # parallel with the deployed-smoke job below.
  integration:
    name: integration + in-process e2e (LocalStack)
    runs-on: ubuntu-latest
    needs: build
    timeout-minutes: 15
    steps:
      - uses: actions/checkout@df4cb1c069e1874edd31b4311f1884172cec0e10 # v6
      - uses: pnpm/action-setup@0ebf47130e4866e96fce0953f49152a61190b271 # v6.0.9
      - uses: actions/setup-node@48b55a011bda9f5d6aeb4c2d9c7362e8dae4041e # v6
        with:
          node-version: 24
          cache: pnpm
      - run: pnpm install --frozen-lockfile
      - uses: actions/download-artifact@d3f86a106a0bac45b974a628896c90dbdf5c8093 # v4
        with:
          name: build-output
      - run: tar -xzf build-output.tar.gz

      # One readiness gate: `localstack:up` starts the container and polls until
      # the services we need report available (scripts/wait-for-localstack.mjs).
      - name: Start LocalStack
        run: pnpm run localstack:up

      - name: Tier A — integration vs LocalStack DynamoDB
        run: pnpm run test:integration
      - name: In-process transport e2e vs LocalStack DynamoDB
        run: pnpm run e2e:inprocess

      - name: LocalStack logs (on failure)
        if: failure()
        run: docker compose logs --tail=200 localstack
      - name: Tear down LocalStack
        if: always()
        run: pnpm run localstack:down

  # Tier B — the deployed smoke test: a full CDK deploy into LocalStack, then the
  # two specs that can ONLY be proven deployed (Function URL reachability and the
  # DynamoDB Streams -> webhook Lambda path). Behavioral coverage lives in the
  # in-process e2e above, so this stays a focused infra check.
  e2e-deploy:
    name: deployed e2e (LocalStack)
    runs-on: ubuntu-latest
    needs: build
    timeout-minutes: 20
    steps:
      - uses: actions/checkout@df4cb1c069e1874edd31b4311f1884172cec0e10 # v6
      - uses: pnpm/action-setup@0ebf47130e4866e96fce0953f49152a61190b271 # v6.0.9
      - uses: actions/setup-node@48b55a011bda9f5d6aeb4c2d9c7362e8dae4041e # v6
        with:
          node-version: 24
          cache: pnpm
      - run: pnpm install --frozen-lockfile
      - uses: actions/download-artifact@d3f86a106a0bac45b974a628896c90dbdf5c8093 # v4
        with:
          name: build-output
      - run: tar -xzf build-output.tar.gz

      - name: Start LocalStack
        run: pnpm run localstack:up

      - name: Deploy CDK stack + deployed e2e
        run: pnpm run e2e:deploy && pnpm run e2e:test

      - name: LocalStack logs (on failure)
        if: failure()
        run: docker compose logs --tail=200 localstack
      - name: Tear down LocalStack
        if: always()
        run: pnpm run localstack:down
