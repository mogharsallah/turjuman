name: ci

# Run on PRs and on pushes to main. Feature branches are covered by their PR, so
# this avoids the duplicate push+pull_request run on every branch push.
on:
  push:
    branches: [main]
  pull_request:

# Cancel an in-progress run when a newer commit is pushed to the same ref, so
# rapid pushes don't pile up redundant (and slow) e2e runs.
concurrency:
  group: ci-${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

# Least privilege: every job here only reads the repo (checkout). None writes
# contents, opens PRs, or touches packages, so default the GITHUB_TOKEN to
# read-only and let any future job opt into more explicitly. (Publishing lives in
# release.yml, which scopes its own elevated permissions.)
permissions:
  contents: read

jobs:
  build-and-unit:
    name: build + typecheck + unit
    runs-on: ubuntu-latest
    timeout-minutes: 15
    steps:
      - uses: actions/checkout@df4cb1c069e1874edd31b4311f1884172cec0e10 # v6
      - uses: pnpm/action-setup@0ebf47130e4866e96fce0953f49152a61190b271 # v6.0.9
      - uses: actions/setup-node@48b55a011bda9f5d6aeb4c2d9c7362e8dae4041e # v6
        with:
          node-version: 24
          cache: pnpm
      - run: pnpm install --frozen-lockfile
      - run: pnpm run build
      - name: OpenAPI snapshot is current (regenerate + check for drift)
        run: |
          pnpm run gen:openapi
          git diff --exit-code -- docs/api-reference/openapi.json \
            || (echo "::error::docs/api-reference/openapi.json is stale — run 'pnpm run gen:openapi' and commit." && exit 1)
      - run: pnpm run typecheck
      - run: pnpm run test:unit # hermetic — integration/e2e suites self-skip

  docs:
    name: docs link check (Mintlify)
    runs-on: ubuntu-latest
    timeout-minutes: 10
    steps:
      - uses: actions/checkout@df4cb1c069e1874edd31b4311f1884172cec0e10 # v6
      - uses: pnpm/action-setup@0ebf47130e4866e96fce0953f49152a61190b271 # v6.0.9
      - uses: actions/setup-node@48b55a011bda9f5d6aeb4c2d9c7362e8dae4041e # v6
        with:
          node-version: 24
      - name: Check internal doc links
        # Leave the Mintlify CLI UNPINNED on purpose: pnpm-workspace.yaml's
        # `minimumReleaseAge: 10080` (7-day cooldown) already blocks freshly
        # published (possibly compromised) versions, so `dlx` resolves to the
        # newest version that is >=7 days old. That cooldown is the supply-chain
        # guard for npm deps (the SHA-pin stance is for GitHub Actions, which have
        # no cooldown). A version pin here breaks CI whenever it is <7 days old.
        run: pnpm dlx mint broken-links
        working-directory: docs

  e2e:
    name: integration + deployed e2e (LocalStack)
    runs-on: ubuntu-latest
    needs: build-and-unit
    timeout-minutes: 20
    steps:
      - uses: actions/checkout@df4cb1c069e1874edd31b4311f1884172cec0e10 # v6
      - uses: pnpm/action-setup@0ebf47130e4866e96fce0953f49152a61190b271 # v6.0.9
      - uses: actions/setup-node@48b55a011bda9f5d6aeb4c2d9c7362e8dae4041e # v6
        with:
          node-version: 24
          cache: pnpm
      - run: pnpm install --frozen-lockfile
      - run: pnpm run build

      - name: Start LocalStack
        run: docker compose up -d localstack
      - name: Wait for LocalStack
        run: node scripts/wait-for-localstack.mjs

      - name: Tier A — integration vs LocalStack DynamoDB
        run: pnpm run test:integration

      - name: Tier B — deploy CDK stack + deployed e2e
        run: pnpm run e2e:deploy && pnpm run e2e:test

      - name: LocalStack logs (on failure)
        if: failure()
        run: docker compose logs --tail=200 localstack

      - name: Tear down LocalStack
        if: always()
        run: docker compose down -v
